services:

  serveur_symfony:

  php:
    container_name: php
    build: ./docker/php
    working_dir: /www/symfony
    volumes:
      - './symfony/:/www/symfony'

  postgres:
    container_name: postgres
    image: postgres:18-alpine3.24
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - symfony_data:/var/lib/postgresql/18/docker

volumes:
  symfony_data: